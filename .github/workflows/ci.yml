name: CI

on:
  push:
    branches:
      - release
    tags:
      - "v*"
  pull_request:
    branches:
      - release

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build twine

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build package
        run: |
          python -m build
          python -m twine check dist/*

  verify-tag-on-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag commit is on release branch
        run: |
          git fetch origin release --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/release"; then
            echo "Tag commit is on release branch."
          else
            echo "Tag must be created from release branch commit."
            exit 1
          fi

  publish-beta:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && (contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha'))
    needs:
      - test-and-build
      - verify-tag-on-release
    runs-on: ubuntu-latest
    environment: pypi-beta
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build beta artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build twine
          python -m unittest discover -s tests
          python -m build
          python -m twine check dist/*

  publish-stable:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha')
    needs:
      - test-and-build
      - verify-tag-on-release
    runs-on: ubuntu-latest
    environment: pypi-production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build stable artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build twine
          python -m unittest discover -s tests
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  release-beta:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && (contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha'))
    needs:
      - publish-beta
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub release (beta)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true

  release-stable:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha')
    needs:
      - publish-stable
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
